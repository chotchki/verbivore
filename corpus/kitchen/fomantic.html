<!DOCTYPE html>
<!-- Fomantic-UI kitchen sink: official markup. Deliberately included BECAUSE
     its widgets are div-built (dropdowns, checkboxes) — a live exercise for
     the ignore-region labeler on a framework that styles divs, not inputs. -->
<html lang="en">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Event desk — Fomantic kitchen sink</title>
<link rel="stylesheet" href="/fomantic/semantic.min.css">
</head>
<body>
<div class="ui menu">
  <a class="item active" href="#register">Register</a>
  <a class="item" href="#sessions">Sessions</a>
  <a class="item" href="#speakers">Speakers</a>
</div>
<div class="ui container" id="register">
  <h1 class="ui header">Conference registration</h1>
  <form class="ui form" aria-label="Registration">
    <div class="two fields">
      <div class="field">
        <label>Name</label>
        <input type="text" name="name" placeholder="Full name">
      </div>
      <div class="field">
        <label>Track</label>
        <div class="ui selection dropdown" id="track">
          <input type="hidden" name="track">
          <i class="dropdown icon"></i>
          <div class="default text">Pick a track</div>
          <div class="menu">
            <div class="item" data-value="systems">Systems</div>
            <div class="item" data-value="ml">Machine learning</div>
            <div class="item" data-value="web">Web</div>
          </div>
        </div>
      </div>
    </div>
    <div class="field">
      <div class="ui checkbox">
        <input type="checkbox" name="workshop">
        <label>Attending workshops</label>
      </div>
    </div>
    <div class="field">
      <div class="ui slider checkbox">
        <input type="checkbox" name="newsletter">
        <label>Subscribe to updates</label>
      </div>
    </div>
    <div class="grouped fields">
      <div class="field"><div class="ui radio checkbox">
        <input type="radio" name="meal" checked><label>Standard meal</label>
      </div></div>
      <div class="field"><div class="ui radio checkbox">
        <input type="radio" name="meal"><label>Vegetarian</label>
      </div></div>
    </div>
    <button class="ui primary button" type="submit">Register</button>
    <button class="ui button" type="button">Reset</button>
  </form>
  <div class="ui styled accordion" id="sessions" style="margin-top: 2em">
    <div class="title active"><i class="dropdown icon"></i>Morning sessions</div>
    <div class="content active"><p>Keynote and systems track.</p></div>
    <div class="title"><i class="dropdown icon"></i>Afternoon sessions</div>
    <div class="content"><p>Workshops and lightning talks.</p></div>
  </div>
</div>
<script src="/fomantic/jquery.min.js"></script>
<script src="/fomantic/semantic.min.js"></script>
<script>
  $(function() {
    $('.ui.dropdown').dropdown();
    $('.ui.checkbox').checkbox();
    $('.ui.accordion').accordion();
  });
</script>
</body>
</html>
