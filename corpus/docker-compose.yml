# Training corpus: OSS webapps we can drive hard and re-theme freely.
# Images are PINNED on purpose — an upgraded theme silently shifts every
# screenshot, so version bumps are a deliberate dataset event, not routine.
services:
  grafana:
    image: grafana/grafana:11.2.0
    ports:
      - "42001:3000"
    environment:
      # Anonymous admin: the harvester should never need a login flow for v1.
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_BASIC_ENABLED=false
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro

  gitea:
    image: gitea/gitea:1.22
    ports:
      - "42002:3000"
    environment:
      - GITEA__security__INSTALL_LOCK=true
      - GITEA__server__ROOT_URL=http://localhost:42002/
      - GITEA__server__HTTP_PORT=3000

  wordpress:
    image: wordpress:6.5.3
    ports:
      - "42003:80"
    environment:
      - WORDPRESS_DB_HOST=wpdb
      - WORDPRESS_DB_USER=wp
      - WORDPRESS_DB_PASSWORD=wp123
      - WORDPRESS_DB_NAME=wordpress
    volumes:
      - wp_html:/var/www/html
    depends_on:
      - wpdb

  wpdb:
    image: mariadb:11.4
    environment:
      - MYSQL_DATABASE=wordpress
      - MYSQL_USER=wp
      - MYSQL_PASSWORD=wp123
      - MYSQL_ROOT_PASSWORD=root123

  # Seed-only tooling (docker compose --profile seed run --rm wpcli ...).
  # Unpinned on purpose: it never renders a harvested pixel.
  wpcli:
    image: wordpress:cli
    profiles: [seed]
    user: "33"
    volumes:
      - wp_html:/var/www/html
    environment:
      - WORDPRESS_DB_HOST=wpdb
      - WORDPRESS_DB_USER=wp
      - WORDPRESS_DB_PASSWORD=wp123
      - WORDPRESS_DB_NAME=wordpress
    depends_on:
      - wpdb

  mediawiki:
    image: mediawiki:1.42
    ports:
      - "42004:80"
    volumes:
      - mw_data:/var/www/data

volumes:
  wp_html:
  mw_data:
