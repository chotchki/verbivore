# Training corpus: OSS webapps we can drive hard and re-theme freely.
# Images are PINNED on purpose — an upgraded theme silently shifts every
# screenshot, so version bumps are a deliberate dataset event, not routine.
services:
  grafana:
    image: grafana/grafana:11.2.0
    ports:
      - "42001:3000"
    environment:
      # Anonymous admin: the harvester should never need a login flow for v1.
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_BASIC_ENABLED=false
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro

  gitea:
    image: gitea/gitea:1.22
    ports:
      - "42002:3000"
    environment:
      - GITEA__security__INSTALL_LOCK=true
      - GITEA__server__ROOT_URL=http://localhost:42002/
      - GITEA__server__HTTP_PORT=3000

  wordpress:
    image: wordpress:6.5.3
    ports:
      - "42003:80"
    environment:
      - WORDPRESS_DB_HOST=wpdb
      - WORDPRESS_DB_USER=wp
      - WORDPRESS_DB_PASSWORD=wp123
      - WORDPRESS_DB_NAME=wordpress
    volumes:
      - wp_html:/var/www/html
    depends_on:
      - wpdb

  wpdb:
    image: mariadb:11.4
    environment:
      - MYSQL_DATABASE=wordpress
      - MYSQL_USER=wp
      - MYSQL_PASSWORD=wp123
      - MYSQL_ROOT_PASSWORD=root123

  # Seed-only tooling (docker compose --profile seed run --rm wpcli ...).
  # Unpinned on purpose: it never renders a harvested pixel.
  wpcli:
    image: wordpress:cli
    profiles: [seed]
    user: "33"
    volumes:
      - wp_html:/var/www/html
    environment:
      - WORDPRESS_DB_HOST=wpdb
      - WORDPRESS_DB_USER=wp
      - WORDPRESS_DB_PASSWORD=wp123
      - WORDPRESS_DB_NAME=wordpress
    depends_on:
      - wpdb

  mediawiki:
    image: mediawiki:1.42
    ports:
      - "42004:80"
    volumes:
      - mw_data:/var/www/data

  superset:
    image: apache/superset:4.0.2
    ports:
      - "42005:8088"
    environment:
      - SUPERSET_SECRET_KEY=verbivore-corpus-not-a-secret
    volumes:
      # AUTH_ROLE_PUBLIC=Admin: same no-login-flow principle as grafana's
      # anonymous admin — the harvester never authenticates.
      - ./superset/superset_config.py:/app/pythonpath/superset_config.py:ro
      - superset_home:/app/superset_home

  metabase:
    image: metabase/metabase:v0.50.26
    ports:
      - "42006:3000"
    volumes:
      - mb_data:/metabase.db

  ghost:
    image: ghost:5.87-alpine
    ports:
      - "42007:2368"
    environment:
      # Development mode keeps the sqlite default; production demands mysql
      # and this corpus does not need a second database for one blog.
      - NODE_ENV=development
      - url=http://localhost:42007
    volumes:
      - ghost_data:/var/lib/ghost/content

  heimdall:
    image: lscr.io/linuxserver/heimdall:2.6.1
    ports:
      - "42008:80"
    volumes:
      - heimdall_data:/config

  # Design-system kitchen sinks: static, nginx-served, assets vendored by
  # seed.sh at pinned versions (vendor/ is gitignored — the pins are the
  # source of truth, the bytes are reproducible downloads).
  bootstrap-examples:
    image: nginx:1.27-alpine
    ports:
      - "42009:80"
    volumes:
      - ./vendor/bootstrap-examples:/usr/share/nginx/html:ro

  uswds-kitchen:
    image: nginx:1.27-alpine
    ports:
      - "42010:80"
    volumes:
      - ./kitchen/uswds.html:/usr/share/nginx/html/index.html:ro
      - ./vendor/uswds:/usr/share/nginx/html/uswds:ro

  aria-practices:
    image: nginx:1.27-alpine
    ports:
      - "42011:80"
    volumes:
      - ./vendor/aria-practices:/usr/share/nginx/html:ro

  materialize-kitchen:
    image: nginx:1.27-alpine
    ports:
      - "42012:80"
    volumes:
      - ./kitchen/materialize.html:/usr/share/nginx/html/index.html:ro
      - ./vendor/materialize:/usr/share/nginx/html/materialize:ro

  bulma-kitchen:
    image: nginx:1.27-alpine
    ports:
      - "42014:80"
    volumes:
      - ./kitchen/bulma.html:/usr/share/nginx/html/index.html:ro
      - ./vendor/bulma:/usr/share/nginx/html/bulma:ro

  fomantic-kitchen:
    image: nginx:1.27-alpine
    ports:
      - "42015:80"
    volumes:
      - ./kitchen/fomantic.html:/usr/share/nginx/html/index.html:ro
      - ./vendor/fomantic:/usr/share/nginx/html/fomantic:ro

  pico-kitchen:
    image: nginx:1.27-alpine
    ports:
      - "42016:80"
    volumes:
      - ./kitchen/pico.html:/usr/share/nginx/html/index.html:ro
      - ./vendor/pico:/usr/share/nginx/html/pico:ro

  zengarden:
    image: nginx:1.27-alpine
    ports:
      - "42017:80"
    volumes:
      - ./vendor/zengarden:/usr/share/nginx/html:ro

  dokuwiki:
    image: lscr.io/linuxserver/dokuwiki:2026-07-14a-ls316
    ports:
      - "42013:80"
    volumes:
      - dokuwiki_data:/config

volumes:
  wp_html:
  mw_data:
  superset_home:
  mb_data:
  ghost_data:
  heimdall_data:
  dokuwiki_data:
